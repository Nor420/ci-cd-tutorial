name: CD Pipeline to Google Cloud Run

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch: {}

env:
  PORT: 5001
  IMAGE: ${{ vars.IMAGE }}:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Setup, test, and build project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Test application
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build, push, and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate for GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate for Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build and tag image
        run: docker build -t ${{ env.IMAGE }} .

      - name: Push image to Docker Hub
        run: docker push ${{ env.IMAGE }}

      - name: Deploy to Cloud Run - Production
        if: github.ref == 'refs/heads/main'
        run: |
          gcloud run deploy ${{ vars.GCR_PROJECT_NAME }} \
            --region ${{ vars.GCR_REGION }} \
            --image ${{ env.IMAGE }} \
            --platform managed \
            --allow-unauthenticated \
            --port ${{ env.PORT }}

      - name: Deploy to Cloud Run - Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          gcloud run deploy ${{ vars.GCR_STAGING_PROJECT_NAME }} \
            --region ${{ vars.GCR_REGION }} \
            --image ${{ env.IMAGE }} \
            --platform managed \
            --allow-unauthenticated \
            --port ${{ env.PORT }}